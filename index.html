    background-size:cover;
    background-position:center;
    padding: 20px 20px 44px;
    display:flex;
    flex-direction:column;
  }
  .hero-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logo-badge{
    background:rgba(255,255,255,0.96);
    padding:8px 14px;
    border-radius:12px;
    display:inline-flex;
    align-items:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);
  }
  .logo-badge img{
    height:30px;
    display:block;
  }
  .clock{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.22);
    padding:7px 13px;
    border-radius:999px;
    font-size:12px;
    color:#EAF0FF;
    backdrop-filter: blur(2px);
  }
  .dot-live{
    width:6px;height:6px;border-radius:50%;
    background:#5CE08A;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(92,224,138,.55);}
    70%{box-shadow:0 0 0 7px rgba(92,224,138,0);}
    100%{box-shadow:0 0 0 0 rgba(92,224,138,0);}
  }

  .hero-title{
    margin-top:auto;
    padding-top:36px;
    color:#fff;
  }
  .hero-eyebrow{
    display:inline-block;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.28);
    color:#DCE6FF;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .hero-title h1{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:28px;
    font-weight:800;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .hero-title .company{
    font-size:14px;
    font-weight:600;
    color:#C3D0F5;
  }

  .wrap{
    max-width:440px;
    margin: -28px auto 0;
    padding: 0 16px 48px;
    position:relative;
  }

  .card{
    background:var(--surface);
    border-radius:var(--radius);
    box-shadow: 0 1px 2px rgba(20,39,78,.06), 0 20px 40px -16px rgba(16,25,59,.28);
    overflow:hidden;
  }

  .tabs{
    display:grid;
    grid-template-columns:1fr 1fr;
    background:var(--paper);
    padding:6px;
    gap:6px;
  }
  .tab{
    border:none;
    background:transparent;
    padding:12px 8px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--muted);
    border-radius:10px;
    cursor:pointer;
    transition: all .18s ease;
  }
  .tab.active[data-tab="checkin"]{ background:var(--in); color:#fff; }
  .tab.active[data-tab="checkout"]{ background:var(--out); color:#fff; }

  .panel{ padding:22px; display:none; }
  .panel.active{ display:block; }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input, .field textarea, .field select{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    background:#fff;
    transition:border-color .15s ease;
  }
  .field select{
    appearance:none;
    -webkit-appearance:none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1l6 6 6-6' stroke='%236B7280' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }
  .field textarea{ resize:vertical; min-height:80px; }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none;
    border-color: var(--brand);
  }

  .radar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border-radius:10px;
    background:var(--paper);
    margin-bottom:18px;
    font-size:13px;
    color:var(--muted);
    min-height:20px;
  }
  .radar-dot{
    width:10px;height:10px;border-radius:50%;
    background:#CBD3E1;
    flex-shrink:0;
    transition: background .2s ease;
  }
  .radar-dot.seeking{
    background: var(--brand);
    animation:pulse-blue 1.2s infinite;
  }
  .radar-dot.ok{ background:var(--in); }
  .radar-dot.fail{ background:var(--danger); }
  @keyframes pulse-blue{
    0%{box-shadow:0 0 0 0 rgba(42,92,224,.5);}
    70%{box-shadow:0 0 0 7px rgba(42,92,224,0);}
    100%{box-shadow:0 0 0 0 rgba(42,92,224,0);}
  }

  button.submit{
    width:100%;
    border:none;
    padding:14px;
    border-radius:10px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:15px;
    color:#fff;
    cursor:pointer;
    transition: transform .12s ease, opacity .12s ease;
  }
  button.submit:active{ transform: scale(0.98); }
  button.submit:disabled{ opacity:.55; cursor:not-allowed; }
  #panel-checkin button.submit{ background: var(--in); }
  #panel-checkout button.submit{ background: var(--out); }

  .msg{

<div class="wrap">
  <div class="card">
    <div class="tabs">

    <!-- CHECK-IN -->
    <div class="panel active" id="panel-checkin">
      <div class="field">
        <label for="ci-nama">Nama lengkap</label>

<script>
  // TODO: ganti dengan URL Web App hasil deploy Google Apps Script (Code.gs)
  const API_URL = 'GANTI_DENGAN_URL_WEB_APP_APPS_SCRIPT';

  function switchTab(tab){
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.getElementById('panel-checkin').classList.toggle('active', tab === 'checkin');
    document.getElementById('panel-checkout').classList.toggle('active', tab === 'checkout');
  }

  function updateClock(){
    const now = new Date();
    const opts = { weekday:'long', day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' };
    document.getElementById('clockText').textContent = now.toLocaleString('id-ID', opts) + ' WIB';
  }
  updateClock();
  setInterval(updateClock, 1000);

  function showMsg(id, type, text){
    const el = document.getElementById(id);
    el.className = 'msg show ' + type;
    el.textContent = text;
  }

  function getLocation(){
    return new Promise((resolve, reject) => {
      if(!navigator.geolocation){
        reject(new Error('Perangkat tidak mendukung layanan lokasi.'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => resolve(pos.coords),
        err => reject(new Error('Gagal mengambil lokasi. Pastikan izin lokasi diaktifkan.')),
        { enableHighAccuracy:true, timeout:12000 }
      );
    });
  }

  async function postData(payload){
    const res = await fetch(API_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain;charset=utf-8' }, // hindari CORS preflight ke Apps Script
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function doCheckin(){
    const nama = document.getElementById('ci-nama').value.trim();
    const nim = document.getElementById('ci-nim').value.trim();
    const asalInstitusi = document.getElementById('ci-asal').value.trim();
    const unitKerja = document.getElementById('ci-unit').value.trim();
    const btn = document.getElementById('ci-btn');
    const dot = document.getElementById('ci-radar-dot');
    const radarText = document.getElementById('ci-radar-text');

    document.getElementById('ci-msg').classList.remove('show');

    if(!nama || !nim || !asalInstitusi || !unitKerja){
      showMsg('ci-msg', 'error', 'Mohon lengkapi semua data terlebih dahulu.');
      return;
    }

    if(API_URL.includes('GANTI_DENGAN_URL')){
      showMsg('ci-msg', 'error', 'API_URL belum diisi. Tempel URL Web App Apps Script di index.html.');
      return;
    }

    btn.disabled = true;
    dot.className = 'radar-dot seeking';
    radarText.textContent = 'Mengambil lokasi kamu…';

    try{
      const coords = await getLocation();
      dot.className = 'radar-dot ok';
      radarText.textContent = 'Lokasi ditemukan, mengirim data absen…';

      const result = await postData({
        action:'checkin',
        nama, nim, asalInstitusi, unitKerja,
        lat: coords.latitude, lng: coords.longitude
      });

      if(result.status === 'success'){
        radarText.textContent = 'Status lokasi: ' + result.statusLokasi;
        showMsg('ci-msg', 'success', result.message);
      } else {
        dot.className = 'radar-dot fail';
        showMsg('ci-msg', 'error', result.message);
      }
    } catch(err){
      dot.className = 'radar-dot fail';
      radarText.textContent = err.message;
      showMsg('ci-msg', 'error', err.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function doCheckout(){
    const nama = document.getElementById('co-nama').value.trim();
    const nim = document.getElementById('co-nim').value.trim();
    const kegiatan = document.getElementById('co-kegiatan').value.trim();
    const btn = document.getElementById('co-btn');

    document.getElementById('co-msg').classList.remove('show');

    if(!nama || !nim || !kegiatan){
      showMsg('co-msg', 'error', 'Mohon lengkapi nama, NIM/NIS, dan kegiatan yang sudah dilakukan.');
      return;
    }

    if(API_URL.includes('GANTI_DENGAN_URL')){
      showMsg('co-msg', 'error', 'API_URL belum diisi. Tempel URL Web App Apps Script di index.html.');
      return;
    }

    btn.disabled = true;
    try{
      const result = await postData({ action:'checkout', nama, nim, kegiatan });
      showMsg('co-msg', result.status === 'success' ? 'success' : 'error', result.message);
    } catch(err){
      showMsg('co-msg', 'error', 'Gagal mengirim data: ' + err.message);
    } finally {
      btn.disabled = false;
    }
  }
</script>
